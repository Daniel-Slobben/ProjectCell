logging.level.slobben: DEBUG
spring:
  application:
    name: Cells

cells:
  setup: EMPTY

  random:
    blockPopulation: '1'
    cellPopulation: '2'

  chaos:
    enabled: 'true'
  pruning-per-generation: '100'
  threads: '4'
  size:
    x: '0'
    y: '0'
    blockSize: '500'
  runmode: AUTO
  targetspeed: '1000'
