spring:
  application:
    name: Cells
properties:
  setup: BIG_SQUARE
  chaos:
    enabled: 'false'
  big-square-size: '2'

  pruning-per-generation: '100'
  threads: '4'

  blockPopulation: '1'
  cellPopulation: '6'

  size:
    x: '0'
    y: '0'
    blockSize: '500'
  runmode: AUTO
  targetspeed: '1000'
