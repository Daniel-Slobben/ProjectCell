logging.level.slobben: DEBUG
spring:
  application:
    name: Cells

cells:
  setup: EMPTY

  random:
    blockPopulation: '1'
    cellPopulation: '2'

  chaos:
    enabled: 'true'
    tics-to-spawn: 200
    world-target-range: 64000
    square-size-min: 600
    square-size-max: 1200

  pruning-per-generation: '100'
  threads: '4'
  size:
    x: '0'
    y: '0'
    blockSize: '500'
  runmode: AUTO
  targetspeed: '1000'
