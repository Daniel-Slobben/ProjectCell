logging.level.slobben: DEBUG
spring:
  application:
    name: Cells
properties:
  setup: RANDOM
  chaos:
    enabled: 'false'
  pruning-per-generation: '100'
  threads: '1'

  blockPopulation: '1'
  cellPopulation: '6'

  size:
    x: '5000'
    y: '5000'
    blockSize: '500'
  runmode: AUTO
  targetspeed: '1000'
