spring:
  application:
    name: Cells

cells:
  pruning-per-generation: '100'
  threads: '4'
  setup: BIG_SQUARE
  chaos:
    world-target-range: '50000'
    enabled: 'false'
    tics-to-spawn: '100'
    square-size-min: '600'
    square-size-max: '2000'
  ## Higher is less population -> ex: 1 in 15
  random:
    blockPopulation: '2'
    cellPopulation: '8'
  size:
    x: '0'
    y: '0'
    blockSize: '500'
  big-square-size: '10'
  runmode: AUTO
  targetspeed: '250'

