spring:
  application:
    name: Cells

cells:
  pruning-per-generation: '100'
  threads: '4'
  setup: EMPTY
  chaos:
    enabled: 'false'
    tics-to-spawn: '150'
    max-hits: '20'
  ## Higher is less population -> ex: 1 in 15
  random:
    blockPopulation: '2'
    cellPopulation: '8'
  size:
    x: '10000'
    y: '10000'
    blockSize: '500'
  runmode: AUTO
  targetspeed: '250'

