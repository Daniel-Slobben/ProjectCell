spring:
  data:
    mongodb:
      auto-index-creation: 'true'
  application:
    name: Cells
properties:
  setup: EMPTY
  chaos:
    enabled: 'false'
  ## Higher is less population -> ex: 1 in 15
  blockPopulation: '2'
  cellPopulation: '8'
  size:
    x: '500'
    y: '500'
    blockSize: '1000'
  big-square-size: '10'
  runmode: AUTO
  targetspeed: '250'
