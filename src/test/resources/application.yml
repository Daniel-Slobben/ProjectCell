spring:
  application:
    name: Cells

cells:
  pruning-per-generation: '100'
  threads: '1'
  setup: BIG_SQUARE
  chaos:
    enabled: 'false'
  ## Higher is less population -> ex: 1 in 15
  random:
    blockPopulation: '2'
    cellPopulation: '8'
  size:
    x: '0'
    y: '0'
    blockSize: '500'
  big-square-size: '10'
  runmode: AUTO
  targetspeed: '250'

